name: Build Android AAB

on:
  workflow_dispatch:
    inputs:
      version_name:
        description: 'Human-readable version (e.g. 1.0.1)'
        required: true
        default: '1.0'

jobs:
  build:
    name: Build signed release AAB
    runs-on: ubuntu-latest
    environment: production

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: temurin

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build React app
        working-directory: frontend
        env:
          REACT_APP_API_URL: ${{ vars.REACT_APP_API_URL }}
          # Real AdMob banner unit ID (env: production); empty → Google test banner + test mode
          REACT_APP_ADMOB_BANNER_ID: ${{ vars.REACT_APP_ADMOB_BANNER_ID }}
          CI: false
        run: |
          npm ci
          npm run build

      - name: Sync Capacitor
        working-directory: frontend
        run: npx cap sync android

      - name: Decode keystore
        run: echo "${{ secrets.RELEASE_KEYSTORE_BASE64 }}" | base64 -d > /tmp/tcg-release.jks

      - name: Build signed AAB
        working-directory: frontend/android
        env:
          KEYSTORE_PATH: /tmp/tcg-release.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          ANDROID_HOME: /usr/local/lib/android/sdk
          # github.run_number is monotonically increasing → unique versionCode per run,
          # which Play Console requires for every upload.
          VERSION_CODE: ${{ github.run_number }}
          VERSION_NAME: ${{ inputs.version_name }}
          # Real AdMob App ID (env: production); empty → Google test App ID in the manifest
          ADMOB_APP_ID: ${{ vars.ADMOB_APP_ID }}
        run: |
          chmod +x gradlew
          ./gradlew bundleRelease

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-aab
          path: frontend/android/app/build/outputs/bundle/release/app-release.aab
          retention-days: 30
