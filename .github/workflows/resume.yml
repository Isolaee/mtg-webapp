name: Resume (start EC2 after pause)

on:
  workflow_dispatch:

jobs:
  resume:
    name: Start EC2 instance
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ vars.AWS_REGION }}

      - name: Start EC2 instance
        env:
          INSTANCE_ID: ${{ secrets.EC2_INSTANCE_ID }}
        run: |
          echo "Starting instance $INSTANCE_ID..."
          aws ec2 start-instances --instance-ids "$INSTANCE_ID"
          aws ec2 wait instance-running --instance-ids "$INSTANCE_ID"
          echo "Instance running."

      - name: Wait for health check
        env:
          INSTANCE_ID: ${{ secrets.EC2_INSTANCE_ID }}
        run: |
          # Give nginx + systemd ~30s to come up after boot
          sleep 30

          # Get the public IP (EIP reattaches automatically on start)
          PUBLIC_IP=$(aws ec2 describe-instances \
            --instance-ids "$INSTANCE_ID" \
            --query "Reservations[0].Instances[0].PublicIpAddress" \
            --output text)

          echo "Public IP: $PUBLIC_IP"

          for i in $(seq 1 10); do
            if curl -sf "http://$PUBLIC_IP/health" > /dev/null 2>&1; then
              echo "Backend is healthy."
              exit 0
            fi
            echo "[$i/10] Waiting for backend..."
            sleep 10
          done

          echo "Backend did not become healthy — check systemd logs via SSM:"
          echo "  aws ssm start-session --target $INSTANCE_ID"
          exit 1
