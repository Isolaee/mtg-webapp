name: Hash Cards (pHash index)

on:
  workflow_dispatch:

jobs:
  hash:
    name: Run hash_cards on EC2
    runs-on: ubuntu-latest
    environment: production
    timeout-minutes: 150

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ vars.AWS_REGION }}

      - name: Get EC2 instance ID from CloudFormation
        id: instance
        run: |
          INSTANCE_ID=$(aws cloudformation describe-stacks \
            --stack-name TcgStack \
            --query "Stacks[0].Outputs[?OutputKey=='InstanceId'].OutputValue" \
            --output text)
          echo "id=$INSTANCE_ID" >> "$GITHUB_OUTPUT"

      - name: Run hash_cards via SSM
        env:
          INSTANCE_ID: ${{ steps.instance.outputs.id }}
          AWS_REGION:  ${{ vars.AWS_REGION }}
        run: |
          COMMAND_ID=$(aws ssm send-command \
            --region "$AWS_REGION" \
            --instance-ids "$INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --comment "hash_cards triggered from GitHub Actions" \
            --timeout-seconds 7200 \
            --parameters commands='[
              "set -eu",
              "DATABASE_URL=sqlite:/var/lib/tcg/mtg_card_db.db /var/lib/tcg/hash_cards"
            ]' \
            --query "Command.CommandId" \
            --output text)

          echo "SSM command ID: $COMMAND_ID"

          # Poll every 30s for up to 2 hours (240 iterations)
          for i in $(seq 1 240); do
            STATUS=$(aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" \
              --instance-id "$INSTANCE_ID" \
              --query "Status" \
              --output text 2>/dev/null || echo "Pending")

            echo "[$i/240] Status: $STATUS"

            if [ "$STATUS" = "Success" ]; then
              aws ssm get-command-invocation \
                --command-id "$COMMAND_ID" \
                --instance-id "$INSTANCE_ID" \
                --query "StandardOutputContent" \
                --output text
              exit 0
            elif [ "$STATUS" = "Failed" ] || [ "$STATUS" = "TimedOut" ] || [ "$STATUS" = "Cancelled" ]; then
              echo "=== STDOUT ==="
              aws ssm get-command-invocation \
                --command-id "$COMMAND_ID" \
                --instance-id "$INSTANCE_ID" \
                --query "StandardOutputContent" \
                --output text
              echo "=== STDERR ==="
              aws ssm get-command-invocation \
                --command-id "$COMMAND_ID" \
                --instance-id "$INSTANCE_ID" \
                --query "StandardErrorContent" \
                --output text
              exit 1
            fi

            sleep 30
          done

          echo "Timed out waiting for hash_cards to complete"
          exit 1
