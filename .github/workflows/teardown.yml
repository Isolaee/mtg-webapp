name: Teardown (destroy all AWS resources)

# Nuclear option — use when you want $0/mo and don't need the site running.
# The database is backed up to S3 before destruction so you can restore later.
# After teardown, re-deploy with: push to main (runs the deploy workflow).

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "destroy everything" to confirm'
        required: true

jobs:
  teardown:
    name: Backup DB then CDK destroy
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.confirm == 'destroy everything' }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ secrets.AWS_REGION }}

      - name: Back up database before destroying anything
        env:
          INSTANCE_ID:   ${{ secrets.EC2_INSTANCE_ID }}
          BACKUP_BUCKET: ${{ secrets.BACKUP_BUCKET }}
          AWS_REGION:    ${{ secrets.AWS_REGION }}
        run: |
          TIMESTAMP=$(date -u +%Y%m%d-%H%M%S)
          BACKUP_KEY="teardown-backup/mtg_card_db_${TIMESTAMP}.db"

          echo "Backing up database to s3://$BACKUP_BUCKET/$BACKUP_KEY ..."

          COMMAND_ID=$(aws ssm send-command \
            --region "$AWS_REGION" \
            --instance-ids "$INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --comment "Pre-teardown DB backup" \
            --parameters commands='[
              "aws s3 cp /var/lib/tcg/mtg_card_db.db s3://'"$BACKUP_BUCKET"'/'"$BACKUP_KEY"'",
              "echo Backup complete"
            ]' \
            --query "Command.CommandId" \
            --output text)

          for i in $(seq 1 12); do
            STATUS=$(aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" \
              --instance-id "$INSTANCE_ID" \
              --query "Status" \
              --output text 2>/dev/null || echo "Pending")
            echo "[$i/12] Backup status: $STATUS"
            [ "$STATUS" = "Success" ] && break
            if [ "$STATUS" = "Failed" ] || [ "$STATUS" = "TimedOut" ]; then
              echo "Backup failed — aborting teardown to protect your data."
              exit 1
            fi
            sleep 10
          done

          echo "Database backed up to: s3://$BACKUP_BUCKET/$BACKUP_KEY"
          echo "BACKUP_KEY=$BACKUP_KEY" >> "$GITHUB_STEP_SUMMARY"
          echo ""
          echo "To restore after re-deploying:"
          echo "  aws s3 cp s3://$BACKUP_BUCKET/$BACKUP_KEY /tmp/mtg_card_db.db"
          echo "  # then push it to the new instance via SSM"

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: cdk/package-lock.json

      - name: CDK destroy
        working-directory: cdk
        run: |
          npm install
          npm run build
          # --force skips the confirmation prompt
          npx cdk destroy --force

      - name: Summary
        run: |
          echo "## Teardown complete" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "All AWS resources have been destroyed. Monthly cost: **\$0**." >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "To restore: push a commit to \`main\` to re-run the deploy workflow." >> "$GITHUB_STEP_SUMMARY"
          echo "The CDK stack will be recreated from scratch. Copy your database" >> "$GITHUB_STEP_SUMMARY"
          echo "backup to the new instance via SSM after the first deploy." >> "$GITHUB_STEP_SUMMARY"
