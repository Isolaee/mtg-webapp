name: E2E Tests

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    name: Playwright e2e
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: backend-rust

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: |
            e2e/package-lock.json
            frontend/package-lock.json

      # Frontend dev server (started by Playwright's webServer) needs its deps.
      - name: Install frontend deps
        working-directory: frontend
        run: npm ci

      - name: Install e2e deps
        working-directory: e2e
        run: npm ci

      - name: Install Playwright browser
        working-directory: e2e
        run: npx playwright install --with-deps chromium

      # Pre-build so the backend webServer (cargo run) starts promptly.
      - name: Build backend
        working-directory: backend-rust
        env:
          SQLX_OFFLINE: "true"
        run: cargo build --bin tcg-backend

      - name: Run e2e tests
        working-directory: e2e
        env:
          CI: "true"
          JWT_SECRET: e2e-test-secret
        run: npx playwright test

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: e2e/playwright-report/
          retention-days: 7
