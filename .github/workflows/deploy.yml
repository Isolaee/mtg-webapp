name: Build and Deploy

on:
  workflow_dispatch:

concurrency:
  group: deploy
  cancel-in-progress: false # never cancel a deploy mid-flight

jobs:
  # ── 1. Infrastructure ────────────────────────────────────────────────────
  infra:
    name: CDK deploy (infra)
    runs-on: ubuntu-latest
    environment: production
    outputs:
      instance-id:      ${{ steps.outputs.outputs.instance-id }}
      frontend-bucket:  ${{ steps.outputs.outputs.frontend-bucket }}
      distribution-id:  ${{ steps.outputs.outputs.distribution-id }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: cdk/package-lock.json

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ vars.AWS_REGION }}

      - name: CDK bootstrap
        working-directory: cdk
        run: npx cdk bootstrap

      - name: CDK deploy
        working-directory: cdk
        run: |
          npm run build
          npx cdk deploy --require-approval never --outputs-file cdk-outputs.json

      - name: Parse CDK outputs
        id: outputs
        working-directory: cdk
        run: |
          echo "instance-id=$(jq -r '.TcgStack.InstanceId' cdk-outputs.json)"           >> "$GITHUB_OUTPUT"
          echo "frontend-bucket=$(jq -r '.TcgStack.FrontendBucketName' cdk-outputs.json)" >> "$GITHUB_OUTPUT"
          echo "distribution-id=$(jq -r '.TcgStack.CloudFrontDistributionId' cdk-outputs.json)" >> "$GITHUB_OUTPUT"

  # ── 2. Frontend ──────────────────────────────────────────────────────────
  frontend:
    name: Build + deploy frontend
    runs-on: ubuntu-latest
    environment: production
    needs: infra
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build React app
        working-directory: frontend
        env:
          REACT_APP_API_URL: ${{ vars.REACT_APP_API_URL }}
          CI: false # treat warnings as warnings, not errors
        run: |
          npm ci
          npm run build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ vars.AWS_REGION }}

      - name: Upload to S3
        run: |
          aws s3 sync frontend/build/ \
            s3://${{ needs.infra.outputs.frontend-bucket }}/ \
            --delete \
            --cache-control "public,max-age=31536000,immutable" \
            --exclude "index.html"
          # index.html must not be cached — it references hashed asset filenames
          aws s3 cp frontend/build/index.html \
            s3://${{ needs.infra.outputs.frontend-bucket }}/index.html \
            --cache-control "no-cache,no-store,must-revalidate"

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ needs.infra.outputs.distribution-id }} \
            --paths "/*"

  # ── 3. Backend ───────────────────────────────────────────────────────────
  backend:
    name: Build + deploy backend
    runs-on: ubuntu-latest
    environment: production
    needs: infra
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: backend-rust

      - name: Build Rust binaries
        working-directory: backend-rust
        env:
          # SQLx runtime queries — no DB needed at compile time
          SQLX_OFFLINE: "true"
        run: cargo build --release --bin tcg-backend --bin seed_riftbound --bin hash_cards

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ vars.AWS_REGION }}

      - name: Stage binaries in S3
        run: |
          aws s3 cp backend-rust/target/release/tcg-backend \
            s3://${{ needs.infra.outputs.frontend-bucket }}/deploy/tcg-backend
          aws s3 cp backend-rust/target/release/seed_riftbound \
            s3://${{ needs.infra.outputs.frontend-bucket }}/deploy/seed_riftbound
          aws s3 cp backend-rust/target/release/hash_cards \
            s3://${{ needs.infra.outputs.frontend-bucket }}/deploy/hash_cards

      - name: Deploy via SSM
        env:
          INSTANCE_ID:     ${{ needs.infra.outputs.instance-id }}
          FRONTEND_BUCKET: ${{ needs.infra.outputs.frontend-bucket }}
          AWS_REGION:      ${{ vars.AWS_REGION }}
        run: |
          COMMAND_ID=$(aws ssm send-command \
            --region "$AWS_REGION" \
            --instance-ids "$INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --comment "Deploy tcg-backend from GitHub Actions" \
            --parameters commands='[
              "set -euo pipefail",
              "aws s3 cp s3://'"$FRONTEND_BUCKET"'/deploy/tcg-backend    /var/lib/tcg/tcg-backend",
              "aws s3 cp s3://'"$FRONTEND_BUCKET"'/deploy/seed_riftbound /var/lib/tcg/seed_riftbound",
              "aws s3 cp s3://'"$FRONTEND_BUCKET"'/deploy/hash_cards      /var/lib/tcg/hash_cards",
              "chmod +x /var/lib/tcg/tcg-backend /var/lib/tcg/seed_riftbound /var/lib/tcg/hash_cards",
              "sudo systemctl restart tcg-backend",
              "sleep 3",
              "curl -sf http://localhost:8080/health || (sudo journalctl -u tcg-backend -n 30 --no-pager && exit 1)"
            ]' \
            --query "Command.CommandId" \
            --output text)

          echo "SSM command ID: $COMMAND_ID"

          # Poll until the command finishes (max ~3 min)
          for i in $(seq 1 18); do
            STATUS=$(aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" \
              --instance-id "$INSTANCE_ID" \
              --query "Status" \
              --output text 2>/dev/null || echo "Pending")

            echo "[$i/18] Status: $STATUS"

            if [ "$STATUS" = "Success" ]; then
              aws ssm get-command-invocation \
                --command-id "$COMMAND_ID" \
                --instance-id "$INSTANCE_ID" \
                --query "StandardOutputContent" \
                --output text
              exit 0
            elif [ "$STATUS" = "Failed" ] || [ "$STATUS" = "TimedOut" ] || [ "$STATUS" = "Cancelled" ]; then
              aws ssm get-command-invocation \
                --command-id "$COMMAND_ID" \
                --instance-id "$INSTANCE_ID" \
                --query "StandardErrorContent" \
                --output text
              exit 1
            fi

            sleep 10
          done

          echo "SSM command timed out waiting for completion"
          exit 1
